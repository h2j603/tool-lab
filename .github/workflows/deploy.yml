name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - 'assets/**'
      - 'index.html'
      - '.nojekyll'
      - '**/*.md'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - run: npm run build

      - name: Sync built output to repo root
        run: |
          rm -rf ./assets
          cp -r dist/assets ./assets
          cp dist/index.html ./index.html
          touch ./.nojekyll

      - name: Commit and push refreshed static bundle
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f index.html assets .nojekyll
          if git diff --cached --quiet; then
            echo "No static bundle changes."
            exit 0
          fi
          git commit -m "chore(deploy): refresh static bundle [skip ci]"
          git push origin main

      - name: Mirror to gh-pages for redundancy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          force_orphan: true
